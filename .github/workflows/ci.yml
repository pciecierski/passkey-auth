name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint and build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/ci.db
      SESSION_SECRET: ci-test-secret-for-github-actions
      RP_ID: localhost
      ORIGIN: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  prisma-migrations:
    name: Prisma migrations (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: passkey
          POSTGRES_PASSWORD: passkey
          POSTGRES_DB: passkey_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U passkey -d passkey_auth"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://passkey:passkey@localhost:5432/passkey_auth
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: |
          npm run prepare:prisma
          npx prisma migrate deploy
